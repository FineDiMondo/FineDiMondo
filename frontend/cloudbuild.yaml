steps:
  # Step 1: Install npm dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    dir: 'frontend'

  # Step 2: Build Angular production
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'frontend'

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-frontend:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'

  # Step 4: Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-frontend:$SHORT_SHA'

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'finedimondo-frontend'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-frontend:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'API_URL=https://finedimondo-backend-[AUTO].run.app/api'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-frontend:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-frontend:latest'

options:
  machineType: 'N1_HIGHCPU_8'

substitutions:
  _REGION: 'europe-west1'
  _SERVICE: 'finedimondo-frontend'

timeout: '1800s'
