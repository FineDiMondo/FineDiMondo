steps:
  # Step 1: Build dell'immagine Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-backend:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Step 2: Push dell'immagine a Google Cloud Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-backend:$SHORT_SHA'

  # Step 3: Deploy su Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'finedimondo-backend'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-backend:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'CLOUDSQL_CONNECTION_NAME=freedomrun-491323:europe-west1:kyuss-instance,DB_USER=kyuss_admin,DB_NAME=kyuss_retro'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-backend:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/finedimondo/finedimondo-backend:latest'

options:
  machineType: 'N1_HIGHCPU_8'

substitutions:
  _REGION: 'europe-west1'
  _SERVICE: 'finedimondo-backend'

timeout: '1800s'
